  <link rel="stylesheet" href="{{ global_stuff['styleUri'] }}">
  <link rel="stylesheet" href="{{ config_css }}">
  <link rel="stylesheet" href="{{ global_stuff['asserts_uri'] }}/css/choices.min.css">
  <link rel="stylesheet" href="{{ global_stuff['asserts_uri'] }}/css/choices-dark-overrides.css">
  <link rel="stylesheet" href="{{ global_stuff['asserts_uri'] }}/css/tom-select.min.css">

  <br/>
  
<div style="height: 100vh;">

  
  <div>
    {{ global_stuff['get_text']('Choose a source to configure') | safe }} ({{ config_source_list | length }} {{ global_stuff['get_text']('sources with individual settings') | safe }})
    
    <select id="config_source_list" placeholder="" autocomplete="off">
      <option value="">Choose a source ...</option>
      {% for source in source_list %}
        <option value="{{ source }}">{{ source }}</option>
      {% endfor %}
    </select>

    <vscode-button class="edit_source_config" id="edit_source_config">
      <img src="{{ global_stuff['asserts_uri'] }}/img/{{ global_stuff['theme_mode'] }}/edit.svg">
    </vscode-button>
    <vscode-button class="delete_source_config" id="delete_source_config">
      <img src="{{ global_stuff['asserts_uri'] }}/img/{{ global_stuff['theme_mode'] }}/trash.svg">
    </vscode-button>
  </div>
  
  <br/>
  <br/>

</div>

  <script src="{{ global_stuff['asserts_uri'] }}/js/choices.min.js"></script>
  <script src="{{ global_stuff['asserts_uri'] }}/js/tom-select.complete.min.js"></script>

  <script>

    new TomSelect("#config_source_list",{
      create: true,
      sortField: {
        field: "text",
        direction: "asc"
      }
    });
  </script>
